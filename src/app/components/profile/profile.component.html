<div class="profile-container">
  <mat-card class="profile-card">
    <div class="profile-header">
      <div class="icon-container">
        <mat-icon color="primary">person_outline</mat-icon>
      </div>
      <div class="title-container">
        <mat-card-title>User Profile</mat-card-title>
        <mat-card-subtitle>Manage your personal information</mat-card-subtitle>
      </div>
    </div>

    <mat-card-content>
      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
        <div *ngIf="message" class="success-message">
          <mat-icon>check_circle</mat-icon>
          <span>{{ message }}</span>
        </div>

        <div *ngIf="error" class="error-message">
          <mat-icon>error_outline</mat-icon>
          <span>{{ error }}</span>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Full Name</mat-label>
            <input matInput formControlName="displayName" placeholder="John Doe">
            <mat-icon matPrefix>person</mat-icon>
            <mat-error *ngIf="profileForm.get('displayName')?.hasError('required')">Name is required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Email Address</mat-label>
            <input matInput formControlName="email" readonly>
            <mat-icon matPrefix>email</mat-icon>
            <mat-hint>Email cannot be changed</mat-hint>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Contact Number</mat-label>
            <input matInput formControlName="contact" placeholder="+1 234 567 890">
            <mat-icon matPrefix>phone</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Age</mat-label>
            <input matInput type="number" formControlName="age" placeholder="25">
            <mat-icon matPrefix>calendar_today</mat-icon>
          </mat-form-field>
        </div>

        <div class="actions">
          <button mat-raised-button color="primary" type="submit" [disabled]="profileForm.invalid || loading">
            <span *ngIf="!loading">Save Changes</span>
            <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
